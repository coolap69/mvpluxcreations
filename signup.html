<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | MVPLUXCREATIONS</title>
  <link rel="stylesheet" href="style.css?v=20260624-premium-shop" />
</head>
<body>
  <main class="auth-page">
    <a class="auth-home-link" href="index.html">MVPLUXCREATIONS</a>
    <section class="auth-card">
      <h1>Create Account</h1>
      <p>Create a screen name for fan votes, request ideas, comments, and future discounts.</p>

      <form class="auth-form">
        <label>
          Screen Name
          <input type="text" placeholder="Your screen name" />
        </label>
        <label>
          Email
          <input type="email" placeholder="you@example.com" />
        </label>
        <label>
          Password
          <span class="password-field">
            <input type="password" placeholder="Password" />
            <button class="password-toggle" type="button" aria-label="Show password" onclick="togglePasswordVisibility(this)">Show</button>
          </span>
        </label>
        <button type="button">Create Account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="signin.html">Sign in</a></p>
    </section>
  </main>
  <script src="script.js?v=20260624-premium-shop"></script>
</body>
</html>
