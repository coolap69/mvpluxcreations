<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | MVPLUXCREATIONS</title>
  <link rel="stylesheet" href="style.css?v=20260624-premium-shop" />
</head>
<body>
  <main class="auth-page">
    <a class="auth-home-link" href="index.html">MVPLUXCREATIONS</a>
    <section class="auth-card">
      <h1>Sign In</h1>
      <p>Access your screen name, fan votes, saved ideas, and future order details.</p>

      <form class="auth-form">
        <label>
          Email
          <input type="email" placeholder="you@example.com" />
        </label>
        <label>
          Password
          <span class="password-field">
            <input type="password" placeholder="Password" />
            <button class="password-toggle" type="button" aria-label="Show password" onclick="togglePasswordVisibility(this)">Show</button>
          </span>
        </label>
        <button type="button">Sign In</button>
      </form>

      <p class="auth-switch">Need an account? <a href="signup.html">Sign up</a></p>
    </section>
  </main>
  <script src="script.js?v=20260624-premium-shop"></script>
</body>
</html>
